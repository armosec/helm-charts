name: 03-Helm chart release

on:
  workflow_dispatch:
    inputs:
      CHARTS_NAME:
        type: choice
        description: What chart do you want to release? Leave empty to release all charts
        required: false
        options:
          - ''
          - kubescape-operator
          - rapid7-operator
      HELM_E2E_TEST:
        description: "Run Helm E2E tests as part of the workflow"
        required: false
        default: true
        type: boolean
      TESTS_BRANCH:
        description: "system tests branch name"
        required: false
        default: "master"
        type: string
      RELEASE_BRANCH:
        description: "branch to release from"
        required: false
        default: "main"
        type: string
      COMMIT_REF:
        description: "commit reference to release from"
        required: false
        default: "main"
        type: string
      BYPASS_ALLOWLIST_DRIFT:
        description: "Set true to pass the GKE Autopilot allowlist drift gate after you have opened a Gerrit allowlist update"
        required: false
        default: false
        type: boolean

  workflow_call:
    inputs:
      COMMIT_REF:
        description: "commit reference to release from"
        required: true
        type: string
      BYPASS_ALLOWLIST_DRIFT:
        required: false
        default: false
        type: boolean
      CHARTS_NAME:
        description: "What chart do you want to release? Leave empty to release all charts"
        required: false
        type: string
      HELM_E2E_TEST:
        description: "Whether to run Helm E2E tests when calling this workflow"
        required: false
        default: true
        type: boolean
      TESTS_BRANCH:
        description: "system tests branch name"
        required: false
        default: "master"
        type: string
      RELEASE_BRANCH:
        description: "branch to release from"
        required: false
        default: "main"
        type: string

jobs:
  e2e-test:
    if: ${{ inputs.HELM_E2E_TEST && inputs.CHARTS_NAME }}
    with:
      BRANCH: ${{ inputs.RELEASE_BRANCH || 'main' }}
      TESTS_BRANCH: ${{ inputs.TESTS_BRANCH }}
      KS_BRANCH: "master"
      CHARTS_NAME: ${{ inputs.CHARTS_NAME }}
    uses: ./.github/workflows/02-e2e-test.yaml
    secrets: inherit

  allowlist-drift-check:
    # Fails the release if either node-agent render drifts from its approved GKE Autopilot
    # allowlist (vendored under gke-allowlist/). Bypass with BYPASS_ALLOWLIST_DRIFT=true
    # after opening a Gerrit allowlist update. See scripts/gke-allowlist/README.md.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.RELEASE_BRANCH || inputs.COMMIT_REF || 'main' }}
      - name: Install Helm
        uses: azure/setup-helm@v3.5
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pyyaml
      - name: Check node-agents vs approved allowlists
        run: |
          set +e; fail=0
          scripts/gke-allowlist/check-drift.sh charts/kubescape-operator gke-allowlist/armo-private-node-agent-1.40-v2.yaml --wrapper || fail=1
          scripts/gke-allowlist/check-drift.sh charts/rapid7-operator   gke-allowlist/armo-rapid7-node-agent-1.40-v2.yaml  --wrapper || fail=1
          set -e
          if [ "$fail" -ne 0 ]; then
            if [ "${{ inputs.BYPASS_ALLOWLIST_DRIFT }}" = "true" ]; then
              echo "::warning::node-agent drifts from an approved allowlist, but BYPASS_ALLOWLIST_DRIFT=true — ensure a Gerrit allowlist update is open."
            else
              echo "::error::node-agent drifts from an approved GKE Autopilot allowlist. Open a Gerrit allowlist update, then re-run the release with BYPASS_ALLOWLIST_DRIFT=true."
              exit 1
            fi
          fi

  helm-chart-release:
    needs: [e2e-test, allowlist-drift-check]
    if: ${{ !cancelled() && (needs.e2e-test.result == 'success' || needs.e2e-test.result == 'skipped' || !inputs.HELM_E2E_TEST || !inputs.CHARTS_NAME) && needs.allowlist-drift-check.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.RELEASE_BRANCH || inputs.COMMIT_REF || 'main' }}
          fetch-depth: 0

      - name: git status
        run: git status

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v3.5

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
        env:
          GITHUB_TOKEN: "${{ github.token }}"
          CR_TOKEN: "${{ github.token }}"
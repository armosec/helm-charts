{{- $ksValues := index .Values "kubescape-operator" }}
{{- $kubectlImage := $ksValues.hostScannerCleanup.image }}
{{- $cleanupName := printf "%s-host-scanner-cleanup" .Release.Name }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $cleanupName }}
  namespace: {{ $ksValues.ksNamespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-5"
    {{- include "kubescape-operator.annotations" (dict "Values" $ksValues) | nindent 4 }}
  labels:
    {{- include "kubescape-operator.labels" (dict "Chart" .Chart "Release" .Release "Values" $ksValues "app" $cleanupName "tier" $ksValues.global.namespaceTier) | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $cleanupName }}
  namespace: {{ $ksValues.ksNamespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-5"
    {{- include "kubescape-operator.annotations" (dict "Values" $ksValues) | nindent 4 }}
  labels:
    {{- include "kubescape-operator.labels" (dict "Chart" .Chart "Release" .Release "Values" $ksValues "app" $cleanupName "tier" $ksValues.global.namespaceTier) | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $cleanupName }}
  namespace: {{ $ksValues.ksNamespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-5"
    {{- include "kubescape-operator.annotations" (dict "Values" $ksValues) | nindent 4 }}
  labels:
    {{- include "kubescape-operator.labels" (dict "Chart" .Chart "Release" .Release "Values" $ksValues "app" $cleanupName "tier" $ksValues.global.namespaceTier) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $cleanupName }}
subjects:
  - kind: ServiceAccount
    name: {{ $cleanupName }}
    namespace: {{ $ksValues.ksNamespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $cleanupName }}
  namespace: {{ $ksValues.ksNamespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "0"
    {{- include "kubescape-operator.annotations" (dict "Values" $ksValues) | nindent 4 }}
  labels:
    {{- include "kubescape-operator.labels" (dict "Chart" .Chart "Release" .Release "Values" $ksValues "app" $cleanupName "tier" $ksValues.global.namespaceTier) | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        {{- include "kubescape-operator.labels" (dict "Chart" .Chart "Release" .Release "Values" $ksValues "app" $cleanupName "tier" $ksValues.global.namespaceTier) | nindent 8 }}
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      {{- if $ksValues.imagePullSecrets }}
      imagePullSecrets:
      {{- if kindIs "string" $ksValues.imagePullSecrets }}
      - name: {{ $ksValues.imagePullSecrets }}
      {{- else }}
      {{- range $ksValues.imagePullSecrets }}
      - name: {{ . }}
      {{- end }}
      {{- end }}
      {{- end }}
      serviceAccountName: {{ $cleanupName }}
      automountServiceAccountToken: true
      restartPolicy: OnFailure
      nodeSelector:
      {{- if $ksValues.hostScannerCleanup.nodeSelector }}
      {{- toYaml $ksValues.hostScannerCleanup.nodeSelector | nindent 8 }}
      {{- else if $ksValues.customScheduling.nodeSelector }}
      {{- toYaml $ksValues.customScheduling.nodeSelector | nindent 8 }}
      {{- end }}
      affinity:
      {{- if $ksValues.hostScannerCleanup.affinity }}
      {{- toYaml $ksValues.hostScannerCleanup.affinity | nindent 8 }}
      {{- else if $ksValues.customScheduling.affinity }}
      {{- toYaml $ksValues.customScheduling.affinity | nindent 8 }}
      {{- end }}
      tolerations:
      {{- if $ksValues.hostScannerCleanup.tolerations }}
      {{- toYaml $ksValues.hostScannerCleanup.tolerations | nindent 8 }}
      {{- else if $ksValues.customScheduling.tolerations }}
      {{- toYaml $ksValues.customScheduling.tolerations | nindent 8 }}
      {{- end }}
      {{- include "kubescape-operator.priorityClassName" (dict "component" $ksValues.hostScannerCleanup "global" $ksValues.customScheduling) | nindent 6 }}
      containers:
        - name: host-scanner-cleanup
          image: "{{ $kubectlImage.repository }}:{{ $kubectlImage.tag }}"
          imagePullPolicy: {{ $kubectlImage.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          command: ["/bin/sh", "-c"]
          args:
            - kubectl delete daemonset host-scanner -n {{ $ksValues.ksNamespace }} --ignore-not-found=true
          resources:
            requests:
              cpu: 10m
              memory: 10Mi
            limits:
              cpu: 100m
              memory: 50Mi

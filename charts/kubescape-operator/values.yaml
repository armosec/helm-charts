kubescape-operator:
  alertCRD:
    installDefault: false
  capabilities:
    manageWorkloads: enable
    nodeProfileService: enable
    runtimeDetection: enable
  imagePullSecret:
    server: quay.io
    username: armosec+armosec_ro
  imagePullSecrets: armosec-readonly
  kubevuln:
    sbomScanner:
      enabled: true
  nodeAgent:
    autoscaler:
      enabled: true
    config:
      hostMalwareSensor: disable
      hostNetworkSensor: disable
    env:
      - name: IGNORERULEBINDINGS
        value: true
    image:
      repository: quay.io/armosec/node-agent
      tag: v0.0.270
    resources:
      limits:
        memory: 1000Mi
    sbomScanner:
      enabled: true
      image:
        repository: quay.io/armosec/node-agent
  operator:
    image:
      tag: v0.2.142
    rulesUpdateConfig:
      enabled: true
      interval: 5m

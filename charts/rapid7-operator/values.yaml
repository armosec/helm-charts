kubescape-operator:
  alertCRD:
    installDefault: false
  capabilities:
    backend-storage: enable
    manageWorkloads: enable
    nodeProfileService: enable
    nodeSbomGeneration: disable
    runtimeDetection: enable
    configurationScan: disable
    vulnerabilityScan: disable
    seccompProfileBackend: crd
  excludeNamespaces: "kubescape,kube-system,kube-public,kube-node-lease,kubeconfig,gmp-system,gmp-public,cortex-agent"
  imagePullSecret:
    server: quay.io
    username: armosec+armosec_ro
  imagePullSecrets: armosec-readonly
  kubevuln:
    sbomScanner:
      enabled: true
  nodeAgent:
    # GKE Autopilot: correct allowlist for this distribution (quay.io/armosec node-agent).
    # Opt-in — enable on Autopilot clusters with:
    #   --set kubescape-operator.nodeAgent.gke.allowlist.enabled=true
    gke:
      allowlist:
        name: armo-rapid7-node-agent-1.40-v2
    autoscaler:
      enabled: true
    config:
      hostMalwareSensor: disable
      hostNetworkSensor: disable
    env:
      - name: IGNORERULEBINDINGS
        value: true
    image:
      repository: quay.io/armosec/node-agent
      tag: v0.0.372
    resources:
      limits:
        memory: 1000Mi
  operator:
    rulesUpdateConfig:
      enabled: true
      interval: 5m

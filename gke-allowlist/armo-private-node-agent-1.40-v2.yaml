apiVersion: auto.gke.io/v1
kind: WorkloadAllowlist
minGKEVersion: 1.32.0-gke.1000000
metadata:
  name: armo-private-node-agent-1.40-v2
  annotations:
    autopilot.gke.io/no-connect: "true"
exemptions:
  # Node Agent monitors all processes/containers on the node, so it needs the host PID namespace.
  - autogke-disallow-hostnamespaces
  # Node Agent needs write access to parts of the host (container runtime socket, eBPF fs) for eBPF.
  - autogke-no-write-mode-hostpath
  # Node Agent needs SYS_ADMIN/SYS_PTRACE/NET_ADMIN/SYSLOG/SYS_RESOURCE/IPC_LOCK/NET_RAW for eBPF.
  - autogke-default-linux-capabilities
  # Autoscaler mode adds a node.kubernetes.io/instance-type nodeSelector per node group;
  # Autopilot disallows that selector key without this exemption.
  - autogke-node-affinity-selector-limitation
matchingCriteria:
  hostPID: true
  containers:
    - name: clamav
      image: ^quay\.io/kubescape/klamav$
      securityContext:
        capabilities:
          add:
            - SYS_PTRACE
      volumeMounts:
        - mountPath: /var/lib/clamav-tmp
          name: clamdb
        - mountPath: /run/clamav
          name: clamrun
        - mountPath: /etc/clamav
          name: etc
          readOnly: true
    - name: sbom-scanner
      image: ^quay\.io/(armosec|kubescape)/node-agent$
      command:
        - /usr/bin/sbom-scanner
      env:
        - name: GOMEMLIMIT
        - name: SOCKET_PATH
        - name: HOST_ROOT
        - name: OTEL_COLLECTOR_SVC
        - name: NODE_NAME
        - name: POD_NAME
        - name: NAMESPACE
        - name: CLUSTER_NAME
      securityContext:
        capabilities:
          drop:
            - ALL
      volumeMounts:
        - mountPath: /sbom-comm
          name: sbom-comm
        - mountPath: /host
          name: host
          readOnly: true
        - mountPath: /tmp
          name: sbom-scanner-tmp
    - name: node-agent
      image: ^quay\.io/(armosec|kubescape)/node-agent$
      env:
        - name: GOMEMLIMIT
        - name: HOST_ROOT
        - name: KS_LOGGER_LEVEL
        - name: KS_LOGGER_NAME
        - name: OTEL_COLLECTOR_SVC
        - name: CLAMAV_SOCKET
        - name: SBOM_SCANNER_SOCKET
        - name: SCANNER_MEMORY_LIMIT
        - name: NODE_NAME
        - name: POD_NAME
        - name: NAMESPACE_NAME
        - name: KUBELET_ROOT
        - name: AGENT_VERSION
        - name: NodeName
        - name: IGNORERULEBINDINGS
        # API_URL is set whenever .Values.server is configured (every backend-connected install).
        - name: API_URL
        # Conditional env from optional node-agent features (egress proxy / custom container
        # runtime path / kernel-version-check skip / full-filesystem malware scan).
        - name: HTTPS_PROXY
        - name: no_proxy
        - name: RUNTIME_PATH
        - name: SKIP_KERNEL_VERSION_CHECK
        - name: MALWARE_SCAN_ALL_FILES
      securityContext:
        capabilities:
          add:
            - SYS_ADMIN
            - SYS_PTRACE
            - NET_ADMIN
            - SYSLOG
            - SYS_RESOURCE
            - IPC_LOCK
            - NET_RAW
        privileged: false
      volumeMounts:
        - mountPath: /host
          name: host
          readOnly: true
        - mountPath: /var/lib/kubelet
          name: kubeletdir
        - mountPath: /run
          name: run
        - mountPath: /var
          name: var
          readOnly: true
        - mountPath: /lib/modules
          name: modules
          readOnly: true
        - mountPath: /sys/kernel/debug
          name: debugfs
        - mountPath: /sys/fs/cgroup
          name: cgroup
          readOnly: true
        - mountPath: /sys/fs/bpf
          name: bpffs
        - mountPath: /data
          name: data
        - mountPath: /profiles
          name: profiles
        - mountPath: /boot
          name: boot
          readOnly: true
        - mountPath: /clamav
          name: clamrun
        - mountPath: /sbom-comm
          name: sbom-comm
        - mountPath: /etc/credentials
          name: cloud-secret
          readOnly: true
        - mountPath: /etc/config/clusterData.json
          name: ks-cloud-config
          readOnly: true
          subPath: clusterData.json
        - mountPath: /etc/config/config.json
          name: config
          readOnly: true
          subPath: config.json
  securityContext:
    appArmorProfile:
      type: Unconfined
  volumes:
    - hostPath:
        path: /
      name: host
    - hostPath:
        path: /var/lib/kubelet
      name: kubeletdir
    - hostPath:
        path: /run
      name: run
    - hostPath:
        path: /var
      name: var
    - hostPath:
        path: /sys/fs/cgroup
      name: cgroup
    - hostPath:
        path: /lib/modules
      name: modules
    - hostPath:
        path: /sys/fs/bpf
      name: bpffs
    - hostPath:
        path: /sys/kernel/debug
      name: debugfs
    - hostPath:
        path: /boot
      name: boot
    - name: data
    - name: profiles
    - hostPath:
        path: /
      name: host-filesystem
    - name: clamdb
    - name: clamrun
    - configMap:
        defaultMode: 420
        name: clamav
      name: etc
    - name: sbom-comm
    - name: sbom-scanner-tmp
    - name: cloud-secret
    - configMap:
        defaultMode: 420
        name: ks-cloud-config
      name: ks-cloud-config
    - configMap:
        defaultMode: 420
        name: node-agent
      name: config
